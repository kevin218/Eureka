name: Dependency Compatibility

on:
  pull_request:
  push:
    branches:
      - main
      - "releases/**"
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * 3"

permissions:
  contents: read

jobs:
  oldest_practical_py311:
    name: oldest-practical py311
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11.0"

      - name: Setup system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libnetcdf-dev libhdf5-dev

      - name: Install oldest-practical compatibility environment
        run: |
          python -m pip install --timeout 60 --retries 5 --upgrade pip
          python -m pip install --timeout 60 --retries 5 \
            -c ci/constraints/oldest-practical-py311.txt \
            -e ".[jwst,hst,test,docs,jupyter,dev]"
          mkdir -p "$HOME/crds_cache"
          echo "CRDS_PATH=$HOME/crds_cache" >> "$GITHUB_ENV"
          echo "CRDS_SERVER_URL=https://jwst-crds.stsci.edu" >> "$GITHUB_ENV"

      - name: Run full test suite
        run: |
          pytest tests

  docs_build:
    name: docs build
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          python -m pip install --timeout 60 --retries 5 --upgrade pip
          python -m pip install --timeout 60 --retries 5 -e ".[docs]"

      - name: Build docs with warnings as errors
        run: |
          sphinx-build -W -b html docs/source docs/_build/html
