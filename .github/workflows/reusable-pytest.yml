name: Reusable Pytest

on:
  workflow_call:
    inputs:
      upload-codecov:
        description: Upload coverage results to Codecov
        required: true
        type: boolean

permissions:
  contents: read

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    env:
      OS: ubuntu-latest
      PYTHON: "3.13"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13.0"

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y libnetcdf-dev libhdf5-dev
          python -m pip install --timeout 60 --retries 5 --upgrade pip
          pip install --timeout 60 --retries 5 ".[jwst,hst,test]"
          mkdir -p "$HOME/crds_cache"
          echo "CRDS_PATH=$HOME/crds_cache" >> "$GITHUB_ENV"
          echo "CRDS_SERVER_URL=https://jwst-crds.stsci.edu" >> "$GITHUB_ENV"

      - name: Log the current Eureka version
        run: pip show eureka-bang

      - name: Run tests and generate coverage report
        run: pytest tests --cov=./src/eureka --cov-report=xml

      - name: Upload coverage reports to Codecov
        if: inputs.upload-codecov
        uses: codecov/codecov-action@v6
        with:
          env_vars: OS,PYTHON
          files: ./coverage.xml
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
