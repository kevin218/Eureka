name: Flake8 Linting

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main
      - "releases/**"

permissions:
  contents: read

jobs:
  lint:
    name: flake8
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8

      - name: Run flake8
        run: flake8
